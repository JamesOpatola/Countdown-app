<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Memoir — Beautiful Countdowns</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #fefce8 0%, #fef9e3 100%);
            min-height: 100vh;
            color: #1e1b2e;
        }

        /* Premium glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Main Layout */
        .app-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 24px 40px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.3);
        }

        .logo-text h1 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e1b2e, #4a3b7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-text p {
            font-size: 0.75rem;
            color: #78716c;
            letter-spacing: 0.3px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            padding: 8px 20px 8px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #f5b041, #e67e22);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            border-radius: 28px;
            padding: 18px 28px;
            flex: 1;
            min-width: 140px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            border: 1px solid #f0ead8;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #d97706;
        }

        /* Category Pills */
        .categories-scroll {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .pill {
            background: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            border: 1px solid #e7e2cf;
            color: #57534e;
        }

        .pill.active {
            background: #d97706;
            color: white;
            border-color: #d97706;
            box-shadow: 0 6px 14px rgba(217, 119, 6, 0.25);
        }

        .pill i {
            margin-right: 8px;
        }

        /* Action Buttons */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .btn-primary {
            background: #1e1b2e;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary i {
            font-size: 1rem;
        }

        .btn-primary:hover {
            background: #2d2a44;
            transform: translateY(-2px);
        }

        .btn-outline-light {
            background: transparent;
            border: 1px solid #d6d0ba;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #57534e;
        }

        /* Countdown Grid */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
            margin-top: 8px;
        }

        .event-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            border: 1px solid #f3efdf;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
        }

        .event-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
            border-color: #f5d99b;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .event-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .category-chip {
            background: #fef3c7;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b45309;
        }

        .countdown-timer {
            background: #fefce8;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            margin: 16px 0;
        }

        .timer-digits {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'Inter', monospace;
            letter-spacing: 2px;
            color: #d97706;
        }

        .event-date {
            font-size: 0.8rem;
            color: #78716c;
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 12px 0;
        }

        .event-notes {
            font-size: 0.8rem;
            color: #78716c;
            background: #faf7ef;
            padding: 10px 14px;
            border-radius: 20px;
            margin-top: 12px;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 20px;
            border-top: 1px solid #f0ead8;
            padding-top: 16px;
        }

        .card-action-btn {
            background: none;
            border: none;
            color: #a8a29e;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .card-action-btn:hover {
            color: #d97706;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 70px 20px;
            background: rgba(255,255,240,0.6);
            border-radius: 48px;
            grid-column: 1/-1;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-container {
            background: white;
            border-radius: 48px;
            max-width: 500px;
            width: 90%;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .modal-container input, .modal-container select, .modal-container textarea {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0 20px;
            border: 1.5px solid #e7e2cf;
            border-radius: 24px;
            font-family: inherit;
            background: #fefcf7;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1b2e;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 2000;
            backdrop-filter: blur(20px);
        }

        @media (max-width: 680px) {
            .app-wrapper { padding: 16px; }
            .timer-digits { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- Header -->
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-hourglass-half" style="color: white;"></i>
            </div>
            <div class="logo-text">
                <h1>memoir</h1>
                <p>count every moment</p>
            </div>
        </div>
        <div class="user-badge" id="userBadge">
            <div class="user-avatar" id="avatarPreview">👤</div>
            <span id="userNameDisplay">Guest</span>
            <i class="fas fa-chevron-down" style="font-size: 12px; opacity: 0.6;"></i>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
        <div class="stat-card"><span class="stat-number" id="totalCount">0</span><br>Events</div>
        <div class="stat-card"><span class="stat-number" id="upcomingCount">0</span><br>Upcoming</div>
        <div class="stat-card"><span class="stat-number" id="pastCount">0</span><br>Memories</div>
    </div>

    <!-- Categories -->
    <div class="categories-scroll" id="categoryContainer">
        <div class="pill active" data-cat="all"><i class="fas fa-star"></i> All</div>
        <div class="pill" data-cat="Birthday"><i class="fas fa-birthday-cake"></i> Birthday</div>
        <div class="pill" data-cat="Work"><i class="fas fa-briefcase"></i> Work</div>
        <div class="pill" data-cat="Family"><i class="fas fa-heart"></i> Family</div>
        <div class="pill" data-cat="Vacation"><i class="fas fa-umbrella-beach"></i> Vacation</div>
        <div class="pill" data-cat="Custom"><i class="fas fa-sparkles"></i> Custom</div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
        <button class="btn-primary" id="openCreateBtn"><i class="fas fa-plus-circle"></i> New countdown</button>
        <div style="display: flex; gap: 12px;">
            <button class="btn-outline-light" id="exportBtn"><i class="fas fa-cloud-arrow-up"></i> Backup</button>
            <button class="btn-outline-light" id="importTriggerBtn"><i class="fas fa-cloud-arrow-down"></i> Restore</button>
            <input type="file" id="importFileInput" accept=".json" style="display: none;">
        </div>
    </div>

    <!-- Countdown Grid -->
    <div id="countdownGrid" class="countdown-grid">
        <div class="empty-state">
            <i class="fas fa-calendar-alt" style="font-size: 48px; opacity: 0.5; margin-bottom: 16px; display: block;"></i>
            <h3>No events yet</h3>
            <p style="margin-top: 8px;">Create your first countdown and start cherishing every moment.</p>
            <button class="btn-primary" id="emptyStateBtn" style="margin-top: 20px;">+ Create countdown</button>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="eventModal" class="modal-overlay">
    <div class="modal-container">
        <h3 id="modalTitle" style="margin-bottom: 8px;">✨ Create new event</h3>
        <input type="text" id="eventName" placeholder="Event name *" autocomplete="off">
        <input type="datetime-local" id="eventDate">
        <select id="eventCategory">
            <option value="Birthday">🎂 Birthday</option><option value="Work">💼 Work</option>
            <option value="Family">👨‍👩‍👧 Family</option><option value="Vacation">✈️ Vacation</option>
            <option value="Custom">⭐ Custom</option>
        </select>
        <textarea id="eventNotes" rows="2" placeholder="Add a memory note..."></textarea>
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
            <button class="btn-outline-light" id="closeModalBtn">Cancel</button>
            <button class="btn-primary" id="saveEventBtn">Save event</button>
        </div>
    </div>
</div>

<script>
    // ---------- DATA (localStorage for now, ready for backend) ----------
    let events = [];
    let currentFilter = "all";
    let editingId = null;

    // Helper functions
    function formatTimeLeft(targetISO) {
        const now = new Date();
        const target = new Date(targetISO);
        const isPast = target < now;
        const diff = Math.abs(target - now);
        const seconds = Math.floor(diff / 1000);
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        const months = Math.floor(days / 30.44);
        const years = Math.floor(days / 365.25);

        if (!isPast) {
            if (years > 0) return `${years} ${years === 1 ? 'year' : 'years'}`;
            if (months > 0) return `${months} ${months === 1 ? 'month' : 'months'}`;
            if (days > 0) return `${days} ${days === 1 ? 'day' : 'days'}`;
            if (hours > 0) return `${hours} ${hours === 1 ? 'hour' : 'hours'}`;
            if (minutes > 0) return `${minutes} ${minutes === 1 ? 'min' : 'mins'}`;
            return `${seconds} sec`;
        } else {
            if (years > 0) return `${years} year ago`;
            if (months > 0) return `${months} months ago`;
            if (days > 0) return `${days} days ago`;
            return `${hours} hours ago`;
        }
    }

    function updateStats() {
        const now = new Date();
        const upcoming = events.filter(e => new Date(e.targetDate) > now).length;
        const past = events.filter(e => new Date(e.targetDate) <= now).length;
        document.getElementById('totalCount').innerText = events.length;
        document.getElementById('upcomingCount').innerText = upcoming;
        document.getElementById('pastCount').innerText = past;
    }

    function renderEvents() {
        const filtered = currentFilter === "all" ? events : events.filter(e => e.category === currentFilter);
        const grid = document.getElementById('countdownGrid');
        if (!filtered.length) {
            grid.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-alt" style="font-size: 48px; opacity: 0.5; margin-bottom: 16px; display: block;"></i><h3>No events yet</h3><p style="margin-top: 8px;">Create your first countdown and start cherishing every moment.</p><button class="btn-primary" id="emptyStateBtn" style="margin-top: 20px;">+ Create countdown</button></div>`;
            const emptyBtn = document.getElementById('emptyStateBtn');
            if(emptyBtn) emptyBtn.onclick = () => openModal();
            return;
        }

        grid.innerHTML = filtered.map(ev => {
            const timeLabel = formatTimeLeft(ev.targetDate);
            const isUpcoming = new Date(ev.targetDate) > new Date();
            return `
                <div class="event-card" data-id="${ev.id}">
                    <div class="card-header">
                        <span class="event-title">${escapeHtml(ev.name)}</span>
                        <span class="category-chip"><i class="fas fa-tag"></i> ${ev.category}</span>
                    </div>
                    <div class="countdown-timer">
                        <div class="timer-digits">${escapeHtml(timeLabel)}</div>
                        <div style="font-size:0.75rem; margin-top: 6px;">${isUpcoming ? 'until the big day' : 'passed · cherished'}</div>
                    </div>
                    <div class="event-date">
                        <i class="far fa-calendar-alt"></i> ${new Date(ev.targetDate).toLocaleDateString(undefined, { year:'numeric', month:'long', day:'numeric' })}
                    </div>
                    ${ev.notes ? `<div class="event-notes"><i class="far fa-pen-to-square"></i> ${escapeHtml(ev.notes.substring(0, 80))}</div>` : ''}
                    <div class="card-actions">
                        <button class="card-action-btn share-event" data-id="${ev.id}"><i class="fas fa-share-nodes"></i> Share</button>
                        <button class="card-action-btn edit-event" data-id="${ev.id}"><i class="fas fa-edit"></i> Edit</button>
                        <button class="card-action-btn delete-event" data-id="${ev.id}"><i class="fas fa-trash-can"></i> Delete</button>
                        <button class="card-action-btn notify-test" data-id="${ev.id}"><i class="fas fa-bell"></i> Remind</button>
                    </div>
                </div>
            `;
        }).join('');

        // attach handlers
        document.querySelectorAll('.edit-event').forEach(btn => btn.addEventListener('click', (e) => openEditModal(btn.dataset.id)));
        document.querySelectorAll('.delete-event').forEach(btn => btn.addEventListener('click', (e) => deleteEvent(btn.dataset.id)));
        document.querySelectorAll('.share-event').forEach(btn => btn.addEventListener('click', (e) => shareEvent(btn.dataset.id)));
        document.querySelectorAll('.notify-test').forEach(btn => btn.addEventListener('click', (e) => {
            const ev = events.find(evt => evt.id === btn.dataset.id);
            if(ev && Notification.permission === "granted") new Notification(`🔔 ${ev.name}`, { body: `Reminder: ${formatTimeLeft(ev.targetDate)} left!` });
            else showToast("Enable notifications in browser");
        }));
        updateStats();
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function showToast(msg) { let t = document.querySelector('.toast'); if(t) t.remove(); let div = document.createElement('div'); div.className = 'toast'; div.innerHTML = msg; document.body.appendChild(div); setTimeout(() => div.remove(), 2200); }
    
    function saveToLocal() { localStorage.setItem('memoir_events', JSON.stringify(events)); }
    function loadFromLocal() { const stored = localStorage.getItem('memoir_events'); if(stored) events = JSON.parse(stored); else events = [ { id: "demo1", name: "New Year", targetDate: "2026-01-01T00:00", category: "Custom", notes: "Welcome 2026!" }, { id: "demo2", name: "Beach Day", targetDate: "2025-08-15T10:00", category: "Vacation", notes: "Pack sunglasses" } ]; renderEvents(); }
    
    function deleteEvent(id) { events = events.filter(e => e.id !== id); saveToLocal(); renderEvents(); showToast("Event removed"); }
    function shareEvent(id) { const ev = events.find(e => e.id === id); if(ev) { navigator.clipboard.writeText(`${ev.name} - ${new Date(ev.targetDate).toLocaleDateString()}`); showToast("📋 Event copied"); } }
    
    function openModal() { editingId = null; document.getElementById("modalTitle").innerHTML = "✨ Create new event"; document.getElementById("eventName").value = ""; document.getElementById("eventDate").value = ""; document.getElementById("eventCategory").value = "Custom"; document.getElementById("eventNotes").value = ""; document.getElementById("eventModal").style.display = "flex"; }
    function openEditModal(id) { const ev = events.find(e => e.id === id); if(!ev) return; editingId = id; document.getElementById("modalTitle").innerHTML = "✏️ Edit moment"; document.getElementById("eventName").value = ev.name; document.getElementById("eventDate").value = ev.targetDate.slice(0,16); document.getElementById("eventCategory").value = ev.category; document.getElementById("eventNotes").value = ev.notes || ""; document.getElementById("eventModal").style.display = "flex"; }
    
    function saveEvent() { const name = document.getElementById("eventName").value.trim(); const targetDate = document.getElementById("eventDate").value; if(!name || !targetDate) { alert("Please fill name and date"); return; } if(editingId) { const index = events.findIndex(e => e.id === editingId); if(index !== -1) events[index] = { ...events[index], name, targetDate, category: document.getElementById("eventCategory").value, notes: document.getElementById("eventNotes").value }; editingId = null; } else { events.push({ id: Date.now().toString(), name, targetDate, category: document.getElementById("eventCategory").value, notes: document.getElementById("eventNotes").value }); } saveToLocal(); renderEvents(); document.getElementById("eventModal").style.display = "none"; showToast("✨ Saved!"); }

    function exportBackup() { const data = JSON.stringify(events); const blob = new Blob([data], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `memoir_backup.json`; a.click(); URL.revokeObjectURL(blob); showToast("Backup exported"); }
    function importBackup(file) { const reader = new FileReader(); reader.onload = (e) => { try { const imported = JSON.parse(e.target.result); if(Array.isArray(imported)) { events = imported; saveToLocal(); renderEvents(); showToast("Restored successfully"); } else alert("Invalid file"); } catch(err) { alert("Error"); } }; reader.readAsText(file); }

    function requestNotificationPerm() { if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") Notification.requestPermission(); }

    // Category Filters
    document.querySelectorAll('.pill').forEach(p => p.addEventListener('click', function(){ document.querySelectorAll('.pill').forEach(pi=>pi.classList.remove('active')); this.classList.add('active'); currentFilter = this.dataset.cat; renderEvents(); }));
    document.getElementById("openCreateBtn").addEventListener("click", openModal);
    document.getElementById("emptyStateBtn") && document.getElementById("emptyStateBtn").addEventListener("click", openModal);
    document.getElementById("closeModalBtn").addEventListener("click", ()=> document.getElementById("eventModal").style.display = "none");
    document.getElementById("saveEventBtn").addEventListener("click", saveEvent);
    document.getElementById("exportBtn").addEventListener("click", exportBackup);
    document.getElementById("importTriggerBtn").addEventListener("click", ()=> document.getElementById("importFileInput").click());
    document.getElementById("importFileInput").addEventListener("change", (e)=> { if(e.target.files[0]) importBackup(e.target.files[0]); e.target.value = ''; });
    window.onclick = (e) => { if(e.target === document.getElementById("eventModal")) document.getElementById("eventModal").style.display = "none"; };
    
    loadFromLocal();
    requestNotificationPerm();
</script>
</body>
</html>
