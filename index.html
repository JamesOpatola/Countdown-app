<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Chrono</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(145deg, #f5f0e8 0%, #ede6d9 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 2rem; color: #c9a96b; }
        .auth-card, .event-card { background: white; border-radius: 32px; padding: 30px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 16px; font-size: 16px; }
        button { background: #c9a96b; color: white; border: none; padding: 14px 28px; border-radius: 30px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; }
        .error-msg { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 16px; margin: 10px 0; text-align: center; display: none; }
        .success-msg { background: #dcfce7; color: #16a34a; padding: 12px; border-radius: 16px; margin: 10px 0; text-align: center; display: none; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .timer-digits { font-size: 2rem; font-weight: bold; color: #c9a96b; text-align: center; }
        .switch-auth { text-align: center; margin-top: 15px; color: #c9a96b; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>✨ PRESTIGE CHRONO</h1>
        <p>Track your special moments</p>
    </div>

    <!-- Sign Up Form -->
    <div id="signupBox" class="auth-card">
        <h2>Create Account</h2>
        <input type="text" id="name" placeholder="Your name">
        <input type="email" id="email" placeholder="Email address">
        <input type="password" id="password" placeholder="Password">
        <div id="signupError" class="error-msg"></div>
        <div id="signupSuccess" class="success-msg"></div>
        <button id="signupBtn">→ Create Account</button>
        <div class="switch-auth" id="showLogin">Already have an account? Log in</div>
    </div>

    <!-- Login Form (hidden initially) -->
    <div id="loginBox" class="auth-card hidden">
        <h2>Log In</h2>
        <input type="email" id="loginEmail" placeholder="Email address">
        <input type="password" id="loginPassword" placeholder="Password">
        <div id="loginError" class="error-msg"></div>
        <button id="loginBtn">→ Log In</button>
        <div class="switch-auth" id="showSignup">Create new account</div>
    </div>

    <!-- Main App (hidden until logged in) -->
    <div id="appBox" class="hidden">
        <div class="auth-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>My Countdowns</h2>
                <button id="logoutBtn" style="width: auto; background: #666;">Logout</button>
            </div>
            <button id="newEventBtn" style="margin: 15px 0;">+ New Countdown</button>
            <div id="eventsGrid" class="grid"></div>
        </div>
    </div>

    <!-- Create/Edit Event Modal -->
    <div id="eventModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 32px; padding: 30px; margin: 20px; max-width: 500px;">
            <h3 id="modalTitle">New Event</h3>
            <input type="text" id="eventName" placeholder="Event name (e.g., Final Exam)">
            <input type="datetime-local" id="eventDate">
            <select id="eventCategory">
                <option>Birthday</option><option>Work</option><option>Family</option><option>Vacation</option><option>Exam</option><option>Custom</option>
            </select>
            <textarea id="eventNotes" rows="2" placeholder="Notes..."></textarea>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="closeModalBtn" style="background: #999;">Cancel</button>
                <button id="saveEventBtn">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    // YOUR BACKEND URL - VERIFY THIS IS CORRECT
    const API_URL = 'https://prestige-chrono.onrender.com';
    
    let token = localStorage.getItem('token');
    let events = [];
    let editingId = null;

    function showError(elementId, message) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 5000);
    }

    function showSuccess(elementId, message) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    // SIGN UP
    document.getElementById('signupBtn').onclick = async () => {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            showError('signupError', 'Email and password required');
            return;
        }
        
        try {
            console.log('Attempting to register:', email);
            const res = await fetch(`${API_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            
            const data = await res.json();
            console.log('Response:', data);
            
            if (data.token) {
                token = data.token;
                localStorage.setItem('token', token);
                showSuccess('signupSuccess', 'Account created! Logging you in...');
                setTimeout(() => {
                    document.getElementById('signupBox').classList.add('hidden');
                    document.getElementById('appBox').classList.remove('hidden');
                    loadEvents();
                }, 1000);
            } else {
                showError('signupError', data.error || 'Registration failed');
            }
        } catch (err) {
            console.error('Fetch error:', err);
            showError('signupError', `Cannot connect to server. Make sure backend is running at ${API_URL}`);
        }
    };

    // LOGIN
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        
        try {
            const res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.token) {
                token = data.token;
                localStorage.setItem('token', token);
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('appBox').classList.remove('hidden');
                loadEvents();
            } else {
                showError('loginError', data.error || 'Login failed');
            }
        } catch (err) {
            showError('loginError', 'Cannot connect to server');
        }
    };

    // LOAD EVENTS
    async function loadEvents() {
        if (!token) return;
        try {
            const res = await fetch(`${API_URL}/api/events`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                events = await res.json();
                renderEvents();
            } else if (res.status === 401) {
                logout();
            }
        } catch (err) {
            console.error('Load events error:', err);
        }
    }

    function renderEvents() {
        const grid = document.getElementById('eventsGrid');
        if (events.length === 0) {
            grid.innerHTML = '<p style="text-align:center; color:#999;">No events yet. Click "+ New Countdown" to start!</p>';
            return;
        }
        
        grid.innerHTML = events.map(ev => {
            const target = new Date(ev.targetDate);
            const now = new Date();
            const diff = target - now;
            const days = Math.floor(diff / (1000*60*60*24));
            const hours = Math.floor((diff % (86400000)) / (3600000));
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            const timeText = diff > 0 ? `${days}d ${hours}h ${mins}m ${secs}s` : 'Event passed';
            
            return `
                <div class="event-card">
                    <h3>${escapeHtml(ev.name)} <span style="font-size:12px; background:#f0e6d2; padding:4px 10px; border-radius:20px;">${ev.category}</span></h3>
                    <div class="timer-digits">${timeText}</div>
                    <p>📅 ${target.toLocaleString()}</p>
                    ${ev.notes ? `<p>📝 ${escapeHtml(ev.notes)}</p>` : ''}
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button onclick="editEvent('${ev.id}')" style="background:#666; width:auto;">Edit</button>
                        <button onclick="deleteEvent('${ev.id}')" style="background:#dc2626; width:auto;">Delete</button>
                    </div>
                </div>
            `;
        }).join('');
        
        // Update timer every second
        setTimeout(() => renderEvents(), 1000);
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }

    async function deleteEvent(id) {
        await fetch(`${API_URL}/api/events/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        loadEvents();
    }

    function editEvent(id) {
        const ev = events.find(e => e.id === id);
        if (ev) {
            editingId = id;
            document.getElementById('eventName').value = ev.name;
            document.getElementById('eventDate').value = ev.targetDate.slice(0,16);
            document.getElementById('eventCategory').value = ev.category;
            document.getElementById('eventNotes').value = ev.notes || '';
            document.getElementById('eventModal').style.display = 'flex';
        }
    }

    document.getElementById('saveEventBtn').onclick = async () => {
        const eventData = {
            name: document.getElementById('eventName').value,
            targetDate: document.getElementById('eventDate').value,
            category: document.getElementById('eventCategory').value,
            notes: document.getElementById('eventNotes').value
        };
        
        if (editingId) {
            await fetch(`${API_URL}/api/events/${editingId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(eventData)
            });
            editingId = null;
        } else {
            await fetch(`${API_URL}/api/events`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(eventData)
            });
        }
        document.getElementById('eventModal').style.display = 'none';
        loadEvents();
    };

    document.getElementById('newEventBtn').onclick = () => {
        editingId = null;
        document.getElementById('eventName').value = '';
        document.getElementById('eventDate').value = '';
        document.getElementById('eventCategory').value = 'Custom';
        document.getElementById('eventNotes').value = '';
        document.getElementById('eventModal').style.display = 'flex';
    };

    document.getElementById('closeModalBtn').onclick = () => {
        document.getElementById('eventModal').style.display = 'none';
    };

    function logout() {
        localStorage.removeItem('token');
        token = null;
        document.getElementById('appBox').classList.add('hidden');
        document.getElementById('signupBox').classList.remove('hidden');
    }

    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('showLogin').onclick = () => {
        document.getElementById('signupBox').classList.add('hidden');
        document.getElementById('loginBox').classList.remove('hidden');
    };
    document.getElementById('showSignup').onclick = () => {
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('signupBox').classList.remove('hidden');
    };

    if (token) {
        document.getElementById('signupBox').classList.add('hidden');
        document.getElementById('appBox').classList.remove('hidden');
        loadEvents();
    }
</script>
</body>
</html>
